<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>试验素材 | HIYAMAX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111;
            --bg-tertiary: #1a1a1a;
            --bg-card: #151515;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --text-muted: #666;
            --border-primary: #333;
            --border-secondary: #222;
            --accent-red: #e74c3c;
            --accent-blue: #3498db;
            --accent-green: #27ae60;
            --accent-orange: #f39c12;
            --accent-purple: #9b59b6;
        }
        
        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #fff;
            --bg-tertiary: #f0f0f0;
            --bg-card: #fafafa;
            --text-primary: #000;
            --text-secondary: #444;
            --text-muted: #888;
            --border-primary: #ddd;
            --border-secondary: #eee;
            --accent-red: #c0392b;
            --accent-blue: #2980b9;
            --accent-green: #229954;
            --accent-orange: #d68910;
            --accent-purple: #8e44ad;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* Header */
        header { margin-bottom: 40px; }
        
        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-primary);
            margin-bottom: 30px;
        }
        
        .nav-top a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        
        .nav-top a:hover { color: var(--accent-blue); }
        
        .nav-actions { display: flex; gap: 12px; align-items: center; }
        
        .pipeline-btn {
            background: rgba(52, 152, 219, 0.15);
            border: 1px solid var(--accent-blue);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--accent-blue);
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .pipeline-btn:hover { background: var(--accent-blue); color: #fff; }
        
        .theme-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .theme-btn:hover { border-color: var(--accent-blue); }
        
        .page-title { text-align: center; margin-bottom: 40px; }
        
        .page-title h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .page-title p { color: var(--text-muted); font-size: 14px; }
        
        /* Experiment Cards */
        .experiment-cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 24px;
        }
        
        .experiment-card {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
        }
        
        .experiment-card:hover {
            border-color: var(--accent-blue);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(52, 152, 219, 0.15);
        }
        
        .experiment-card-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-secondary);
            background: linear-gradient(135deg, rgba(231,76,60,0.1), rgba(52,152,219,0.1));
        }
        
        .experiment-card-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 6px;
        }
        
        .experiment-card-subtitle {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .experiment-card-content {
            padding: 20px;
        }
        
        .video-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }
        
        .video-item {
            position: relative;
            border-radius: 10px;
            overflow: hidden;
            background: var(--bg-primary);
            aspect-ratio: 9/16;
            cursor: pointer;
        }
        
        .video-item video,
        .video-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        
        .video-item .play-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .video-item:hover .play-overlay {
            opacity: 1;
        }
        
        .play-icon {
            width: 44px;
            height: 44px;
            border: 2px solid white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.5);
        }
        
        .play-icon::after {
            content: '';
            width: 0;
            height: 0;
            border-left: 14px solid white;
            border-top: 9px solid transparent;
            border-bottom: 9px solid transparent;
            margin-left: 3px;
        }
        
        .video-label {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 10px;
            background: linear-gradient(transparent, rgba(0,0,0,0.85));
            font-size: 11px;
            color: white;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .video-meta {
            font-size: 10px;
            color: rgba(255,255,255,0.7);
            margin-top: 2px;
        }
        
        footer {
            margin-top: 60px;
            padding-top: 30px;
            border-top: 1px solid var(--border-primary);
            text-align: center;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        @media (max-width: 600px) {
            .video-grid { grid-template-columns: 1fr; }
            .experiment-cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-top">
                <a href="./pipeline.html">← 返回流水线</a>
                <div class="nav-actions">
                    <a href="./" class="pipeline-btn">🏠 首页</a>
                    <button class="theme-btn" onclick="toggleTheme()">🌓 切换主题</button>
                </div>
            </div>
        </header>
        
        <div class="page-title">
            <h1>🧪 试验素材</h1>
            <p>AI视频生成实验 · 提示词优化对比</p>
        </div>
        
        <div class="experiment-cards">
            <!-- 卡片1：女侠 -->
            <div class="experiment-card">
                <div class="experiment-card-header">
                    <div class="experiment-card-title">🗡️ 女侠</div>
                    <div class="experiment-card-subtitle">武侠风格视频生成实验 · 5个版本对比 · 测试提示词对角色稳定性的影响</div>
                </div>
                <div class="experiment-card-content">
                    <div class="video-grid">
                        <div class="video-item" onclick="playVideo(this, './assets/experiments/experiment_wuxia_rider_20260331_202620.mp4')">
                            <img src="./assets/experiments/experiment_wuxia_rider_20260331_202620_poster.jpg" alt="V1-基础版">
                            <div class="play-overlay">
                                <div class="play-icon"></div>
                            </div>
                            <div class="video-label">
                                V1 基础版
                                <div class="video-meta">首次实验 · 基础动态</div>
                            </div>
                        </div>
                        
                        <div class="video-item" onclick="playVideo(this, './assets/experiments/experiment_wuxia_charge_20260331_203010.mp4')">
                            <img src="./assets/experiments/experiment_wuxia_charge_20260331_203010_poster.jpg" alt="V2 冲锋版">
                            <div class="play-overlay">
                                <div class="play-icon"></div>
                            </div>
                            <div class="video-label">
                                V2 冲锋版
                                <div class="video-meta">原提示词 · 狂暴/剧烈/强烈</div>
                            </div>
                        </div>
                        
                        <div class="video-item" onclick="playVideo(this, './assets/experiments/experiment_wuxia_v3_20260331_205601.mp4')">
                            <img src="./assets/experiments/experiment_wuxia_v3_20260331_205601_poster.jpg" alt="V3 稳定版">
                            <div class="play-overlay">
                                <div class="play-icon"></div>
                            </div>
                            <div class="video-label">
                                V3 稳定版
                                <div class="video-meta">详细角色锚定 · 保守稳定</div>
                            </div>
                        </div>
                        
                        <div class="video-item" onclick="playVideo(this, './assets/experiments/experiment_wuxia_v4_20260331_204800.mp4')">
                            <img src="./assets/experiments/experiment_wuxia_v4_20260331_204800_poster.jpg" alt="V4 优化版">
                            <div class="play-overlay">
                                <div class="play-icon"></div>
                            </div>
                            <div class="video-label">
                                V4 优化版
                                <div class="video-meta">微动态优化 · 自然飘动</div>
                            </div>
                        </div>
                        
                        <div class="video-item" onclick="playVideo(this, './assets/experiments/experiment_wuxia_hair_detail_20260331_211347.mp4')">
                            <img src="./assets/experiments/experiment_wuxia_hair_detail_20260331_211347_poster.jpg" alt="发丝版">
                            <div class="play-overlay">
                                <div class="play-icon"></div>
                            </div>
                            <div class="video-label">
                                发丝细节版
                                <div class="video-meta">上半身特写 · 发丝分层飘动</div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <footer>
            <p>HIYAMAX AI Shortfilm Lab · 试验素材库</p>
            <p>点击封面即可播放视频</p>
        </footer>
    </div>
    
    <script>
        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }
        
        // Load saved theme
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
        
        // Video play function
        function playVideo(element, videoSrc) {
            const existingVideo = element.querySelector('video');
            if (existingVideo) {
                existingVideo.play();
                return;
            }
            
            const video = document.createElement('video');
            video.src = videoSrc;
            video.controls = true;
            video.autoplay = true;
            video.style.cssText = 'position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:10;';
            
            const img = element.querySelector('img');
            const overlay = element.querySelector('.play-overlay');
            const label = element.querySelector('.video-label');
            
            if (img) img.style.display = 'none';
            if (overlay) overlay.style.display = 'none';
            if (label) label.style.display = 'none';
            
            element.appendChild(video);
            
            video.onended = function() {
                video.remove();
                if (img) img.style.display = 'block';
                if (overlay) overlay.style.display = 'flex';
                if (label) label.style.display = 'block';
            };
        }
    </script>
</body>
</html>
