<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>生产流水线 | HIYAMAX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #000;
            --bg-card: #111;
            --text-primary: #fff;
            --text-secondary: #888;
            --text-muted: #666;
            --border-primary: #333;
            --border-secondary: #1a1a1a;
            --accent-red: #e74c3c;
            --accent-blue: #3498db;
            --accent-green: #27ae60;
            --accent-orange: #f39c12;
            --accent-purple: #9b59b6;
            --hover-bg: rgba(52, 152, 219, 0.05);
        }
        
        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #fff;
            --bg-card: #fafafa;
            --text-primary: #000;
            --text-secondary: #444;
            --text-muted: #666;
            --border-primary: #ddd;
            --border-secondary: #eee;
            --accent-red: #c0392b;
            --accent-blue: #2980b9;
            --accent-green: #229954;
            --accent-orange: #d68910;
            --accent-purple: #8e44ad;
            --hover-bg: rgba(52, 152, 219, 0.08);
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.8;
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
        }
        
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 20px;
        }
        
        /* Header */
        header {
            border-bottom: 2px solid;
            border-image: linear-gradient(90deg, var(--accent-red), var(--accent-blue)) 1;
            padding-bottom: 30px;
            margin-bottom: 40px;
            text-align: center;
        }
        
        .logo {
            max-width: 200px;
            width: 100%;
            height: auto;
            margin-bottom: 15px;
        }
        
        .page-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .page-subtitle {
            font-size: 14px;
            color: var(--text-muted);
        }
        
        nav {
            margin-top: 25px;
        }
        
        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            margin: 0 15px;
            font-size: 14px;
            transition: all 0.3s;
            padding: 5px 0;
            border-bottom: 1px solid transparent;
        }
        
        nav a:hover {
            color: var(--accent-blue);
            border-bottom: 1px solid var(--accent-blue);
        }
        
        /* Project Info */
        .project-info {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 25px;
            margin-bottom: 30px;
        }
        
        .project-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 10px;
        }
        
        .project-emoji {
            font-size: 40px;
        }
        
        .project-title {
            font-size: 24px;
            font-weight: 600;
        }
        
        .project-meta {
            display: flex;
            gap: 20px;
            margin-top: 10px;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .project-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .status-badge {
            background: var(--accent-orange);
            color: #fff;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
        }
        
        /* Project Selector */
        .project-selector {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 40px;
        }
        
        .project-selector h3 {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
        }
        
        .project-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .project-tag {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 13px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .project-tag:hover,
        .project-tag.active {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
            background: var(--hover-bg);
        }
        
        /* Pipeline Flow */
        .pipeline-flow {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-bottom: 50px;
            flex-wrap: wrap;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .flow-step {
            padding: 6px 12px;
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 4px;
        }
        
        .flow-arrow {
            color: var(--accent-blue);
        }
        
        /* Stage Cards */
        .stage {
            margin-bottom: 50px;
        }
        
        .stage-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }
        
        .stage-number {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-red), var(--accent-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 16px;
            color: #fff;
        }
        
        .stage-title {
            font-size: 20px;
            font-weight: 600;
        }
        
        .stage-desc {
            font-size: 13px;
            color: var(--text-muted);
        }
        
        /* Three Column Layout */
        .stage-content {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }
        
        @media (max-width: 768px) {
            .stage-content {
                grid-template-columns: 1fr;
            }
        }
        
        .column {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 12px;
            padding: 20px;
        }
        
        .column-header {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-secondary);
        }
        
        .column.input .column-header { color: var(--accent-orange); }
        .column.decision .column-header { color: var(--accent-blue); }
        .column.output .column-header { color: var(--accent-green); }
        
        .column-content {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        
        .column-content p {
            margin-bottom: 12px;
        }
        
        .column-content strong {
            color: var(--text-primary);
        }
        
        .placeholder {
            color: var(--text-muted);
            font-style: italic;
            padding: 20px;
            text-align: center;
            border: 2px dashed var(--border-primary);
            border-radius: 8px;
        }
        
        /* Decision Badge */
        .decision-badge {
            display: inline-block;
            background: var(--hover-bg);
            border: 1px solid var(--accent-blue);
            border-radius: 4px;
            padding: 4px 10px;
            font-size: 12px;
            color: var(--accent-blue);
            margin: 5px 5px 5px 0;
        }
        
        /* Code block */
        .code-block {
            background: var(--bg-secondary);
            padding: 12px;
            border-radius: 6px;
            font-family: monospace;
            font-size: 12px;
            margin: 10px 0;
            overflow-x: auto;
        }
        
        /* Image placeholder */
        .img-placeholder {
            width: 100%;
            aspect-ratio: 16/9;
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            font-size: 12px;
            margin-top: 10px;
        }
        
        /* Timeline */
        .timeline {
            position: relative;
            padding-left: 25px;
        }
        
        .timeline::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0;
            bottom: 0;
            width: 2px;
            background: linear-gradient(180deg, var(--accent-red), var(--accent-blue));
        }
        
        .timeline-item {
            position: relative;
            margin-bottom: 15px;
            padding-left: 15px;
        }
        
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -21px;
            top: 6px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--accent-blue);
        }
        
        .timeline-time {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 3px;
        }
        
        .timeline-content {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-primary);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Error */
        .error {
            text-align: center;
            padding: 60px 20px;
            color: var(--accent-red);
        }
        
        /* Footer */
        footer {
            margin-top: 80px;
            padding-top: 40px;
            border-top: 1px solid var(--border-primary);
            text-align: center;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .theme-toggle {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 20px;
            padding: 8px 16px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            margin-top: 20px;
        }
        
        .theme-toggle:hover {
            border-color: var(--accent-blue);
            color: var(--accent-blue);
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <img src="./logo.png" alt="HIYAMAX" class="logo">
            <h1 class="page-title">AI短剧生产流水线</h1>
            <p class="page-subtitle">Design → Decision → Deliver 全链路记录</p>
            <nav>
                <a href="./">首页</a>
                <a href="./#films">实验短片</a>
                <a href="./pipeline.html">生产流水线</a>
            </nav>
        </header>
        
        <!-- Project Selector -->
        <div class="project-selector">
            <h3>选择项目查看生产过程</h3>
            <div class="project-list" id="projectList">
                <!-- Projects loaded dynamically -->
            </div>
        </div>
        
        <!-- Project Content -->
        <div id="projectContent">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载项目中...</p>
            </div>
        </div>
        
        <!-- Footer -->
        <footer>
            <p>© 2026 HIYAMAX · AI Shortfilm Lab</p>
            <p style="margin-top: 10px;">数据驱动架构 | 添加新项目只需创建JSON文件</p>
            <button class="theme-toggle" onclick="toggleTheme()" title="切换主题">
                <span id="theme-icon">☀️</span>
                <span id="theme-text">Daylight</span>
            </button>
        </footer>
    </div>
    
    <script>
        // Project registry - add new projects here
        const PROJECTS = [
            { id: 'kite', emoji: '🪁', title: '纸鸢归' },
            { id: 'mooncake', emoji: '🥮', title: '外婆的月饼模' },
            { id: 'parking', emoji: '🚗', title: '平行停车' },
            { id: 'shiba', emoji: '🐕', title: '柴犬物语' },
            { id: 'pythagoras', emoji: '📐', title: '勾股定理' },
            { id: 'the_147th_day', emoji: '🤖', title: '第147天' }
        ];
        
        let currentProject = 'pythagoras';
        
        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const currentTheme = html.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            updateThemeButton(newTheme);
        }
        
        function updateThemeButton(theme) {
            const icon = document.getElementById('theme-icon');
            const text = document.getElementById('theme-text');
            
            if (theme === 'light') {
                icon.textContent = '🌙';
                text.textContent = 'DeepDark';
            } else {
                icon.textContent = '☀️';
                text.textContent = 'Daylight';
            }
        }
        
        // Load saved theme
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', savedTheme);
            updateThemeButton(savedTheme);
        })();
        
        // Render project selector
        function renderProjectSelector() {
            const container = document.getElementById('projectList');
            container.innerHTML = PROJECTS.map(p => `
                <a href="?project=${p.id}" 
                   class="project-tag ${p.id === currentProject ? 'active' : ''}"
                   onclick="loadProject('${p.id}'); return false;"
                   data-project="${p.id}">
                    ${p.emoji} ${p.title}
                </a>
            `).join('');
        }
        
        // Load project data
        async function loadProject(projectId) {
            currentProject = projectId;
            renderProjectSelector();
            
            // Update URL
            history.pushState(null, null, `?project=${projectId}`);
            
            const contentDiv = document.getElementById('projectContent');
            contentDiv.innerHTML = `
                <div class="loading">
                    <div class="loading-spinner"></div>
                    <p>加载项目中...</p>
                </div>
            `;
            
            try {
                const response = await fetch(`./pipeline/data/${projectId}.json`);
                if (!response.ok) throw new Error('Project not found');
                const data = await response.json();
                renderProject(data);
            } catch (error) {
                contentDiv.innerHTML = `
                    <div class="error">
                        <p>❌ 加载失败：${error.message}</p>
                        <p style="margin-top: 10px; font-size: 13px;">请检查项目数据文件是否存在</p>
                    </div>
                `;
            }
        }
        
        // Render project content
        function renderProject(data) {
            const contentDiv = document.getElementById('projectContent');
            
            let html = '';
            
            // Project info header
            html += `
                <div class="project-info">
                    <div class="project-header">
                        <span class="project-emoji">${data.emoji}</span>
                        <div>
                            <div class="project-title">${data.title}</div>
                            <div class="project-meta">
                                <span>⏱️ ${data.duration}</span>
                                <span>📊 ${data.status}</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="pipeline-flow">
                    <span class="flow-step">构思</span>
                    <span class="flow-arrow">→</span>
                    <span class="flow-step">角色</span>
                    <span class="flow-arrow">→</span>
                    <span class="flow-step">分镜</span>
                    <span class="flow-arrow">→</span>
                    <span class="flow-step">生成</span>
                    <span class="flow-arrow">→</span>
                    <span class="flow-step">剪辑</span>
                    <span class="flow-arrow">→</span>
                    <span class="flow-step">发布</span>
                </div>
            `;
            
            // Stages
            data.stages.forEach(stage => {
                html += renderStage(stage);
            });
            
            contentDiv.innerHTML = html;
        }
        
        // Render single stage
        function renderStage(stage) {
            return `
                <div class="stage" id="stage-${stage.number}">
                    <div class="stage-header">
                        <div class="stage-number">${stage.number}</div>
                        <div>
                            <div class="stage-title">${stage.title}</div>
                            <div class="stage-desc">${stage.desc}</div>
                        </div>
                    </div>
                    
                    <div class="stage-content">
                        <div class="column input">
                            <div class="column-header">📥 ${stage.input.title}</div>
                            <div class="column-content">
                                ${renderColumnContent(stage.input)}
                            </div>
                        </div>
                        
                        <div class="column decision">
                            <div class="column-header">🤔 ${stage.decision.title}</div>
                            <div class="column-content">
                                ${renderColumnContent(stage.decision)}
                            </div>
                        </div>
                        
                        <div class="column output">
                            <div class="column-header">✅ ${stage.output.title}</div>
                            <div class="column-content">
                                ${renderColumnContent(stage.output)}
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        // Render column content
        function renderColumnContent(column) {
            if (column.placeholder) {
                return `<div class="placeholder">[${column.placeholder}]</div>`;
            }
            
            let html = '';
            
            // Badges
            if (column.badges) {
                html += column.badges.map(b => `<span class="decision-badge">${b}</span>
                `).join('');
            }
            
            if (column.content) {
                html += column.content.map(item => {
                    if (item.timeline) {
                        return `
                            <p><strong>${item.subtitle}</strong></p>
                            <div class="timeline">
                                ${item.timeline.map(t => `
                                    <div class="timeline-item">
                                        <div class="timeline-time">${t.time}</div>
                                        <div class="timeline-content">${t.desc}</div>
                                    </div>
                                `).join('')}
                            </div>
                        `;
                    }
                    
                    if (item.code) {
                        return `
                            <p><strong>${item.subtitle}</strong></p>
                            ${item.text ? `<p>${item.text}</p>` : ''}
                            <div class="code-block">${item.code}</div>
                        `;
                    }
                    
                    return `
                        <p><strong>${item.subtitle}</strong></p>
                        <p>${item.text ? item.text.replace(/\n/g, '<br>') : ''}</p>
                    `;
                }).join('');
            }
            
            // Image - if it's a URL/path, show actual image
            if (column.image) {
                if (column.image.startsWith('[')) {
                    // Placeholder text like "[角色设计图]"
                    html += `<div class="img-placeholder">${column.image}</div>`;
                } else {
                    // Actual image path/URL
                    html += `
                        <div class="resource-image" style="margin-top: 15px;">
                            <img src="${column.image}" alt="${column.imageCaption || '图片'}" 
                                 style="max-width: 100%; border-radius: 8px; border: 1px solid var(--border-primary);">
                            ${column.imageCaption ? `<p style="font-size: 12px; color: var(--text-muted); margin-top: 8px;">${column.imageCaption}</p>` : ''}
                        </div>
                    `;
                }
            }
            
            // Videos - show video players
            if (column.videos && column.videos.length > 0) {
                html += `<div class="resource-videos" style="margin-top: 15px;">`;
                column.videos.forEach(video => {
                    html += `
                        <div class="video-item" style="margin-bottom: 15px; padding: 12px; background: var(--bg-secondary); border-radius: 8px; border: 1px solid var(--border-primary);">
                            <p style="font-weight: 600; margin-bottom: 8px; font-size: 13px;">${video.title}</p>
                            ${video.desc ? `<p style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">${video.desc}</p>` : ''}
                            <video controls style="width: 100%; border-radius: 4px; max-height: 200px;"
                                   poster="">
                                <source src="${video.src}" type="video/mp4">
                                您的浏览器不支持视频播放
                            </video>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            
            return html || '<div class="placeholder">[暂无内容]</div>';
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            renderProjectSelector();
            
            // Check URL params
            const params = new URLSearchParams(window.location.search);
            const projectId = params.get('project') || 'pythagoras';
            loadProject(projectId);
        });
    </script>
</body>
</html>
