<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>项目工作区 | HIYAMAX</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111;
            --bg-tertiary: #1a1a1a;
            --bg-card: #151515;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --text-muted: #666;
            --border-primary: #333;
            --border-secondary: #222;
            --accent-red: #e74c3c;
            --accent-blue: #3498db;
            --accent-green: #27ae60;
            --accent-orange: #f39c12;
            --accent-purple: #9b59b6;
            --status-discussing: #f39c12;
            --status-completed: #27ae60;
            --status-pending: #666;
        }
        
        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #fff;
            --bg-tertiary: #f0f0f0;
            --bg-card: #fafafa;
            --text-primary: #000;
            --text-secondary: #444;
            --text-muted: #888;
            --border-primary: #ddd;
            --border-secondary: #eee;
            --accent-red: #c0392b;
            --accent-blue: #2980b9;
            --accent-green: #229954;
            --accent-orange: #d68910;
            --accent-purple: #8e44ad;
            --status-discussing: #d68910;
            --status-completed: #229954;
            --status-pending: #888;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* Header */
        header {
            border-bottom: 2px solid var(--border-primary);
            padding-bottom: 20px;
            margin-bottom: 30px;
        }
        
        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .nav-top a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
        }
        
        .theme-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-primary);
            border-radius: 20px;
            padding: 6px 12px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
        }
        
        /* Project Header */
        .project-header {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 30px;
        }
        
        .project-title-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .project-emoji {
            font-size: 48px;
        }
        
        .project-title-text h1 {
            font-size: 28px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .project-title-text p {
            font-size: 14px;
            color: var(--text-muted);
        }
        
        .project-meta {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .project-meta span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .status-badge {
            padding: 3px 10px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 500;
        }
        
        .status-discussing {
            background: rgba(243, 156, 18, 0.15);
            color: var(--status-discussing);
            border: 1px solid var(--status-discussing);
        }
        
        .status-completed {
            background: rgba(39, 174, 96, 0.15);
            color: var(--status-completed);
            border: 1px solid var(--status-completed);
        }
        
        .status-pending {
            background: rgba(102, 102, 102, 0.15);
            color: var(--status-pending);
            border: 1px solid var(--status-pending);
        }
        
        /* Quick Nav */
        .quick-nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-bottom: 30px;
            padding: 15px;
            background: var(--bg-secondary);
            border-radius: 12px;
        }
        
        .quick-nav a {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .quick-nav a:hover,
        .quick-nav a.active {
            background: var(--accent-blue);
            color: #fff;
        }
        
        /* Step Section */
        .step-section {
            margin-bottom: 40px;
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .step-header {
            padding: 20px 25px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .step-title-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .step-number {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-red), var(--accent-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }
        
        .step-title-group h2 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .step-title-group p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        .step-body {
            padding: 25px;
        }
        
        /* Version Tabs */
        .version-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-primary);
            padding-bottom: 15px;
        }
        
        .version-tab {
            padding: 6px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .version-tab:hover {
            border-color: var(--accent-blue);
        }
        
        .version-tab.active {
            background: var(--accent-blue);
            border-color: var(--accent-blue);
            color: #fff;
        }
        
        .version-tab.obsolete {
            opacity: 0.5;
            text-decoration: line-through;
        }
        
        /* Content Blocks */
        .content-block {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .content-block h3 {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-secondary);
        }
        
        .content-block h4 {
            font-size: 14px;
            color: var(--text-primary);
            margin: 15px 0 8px;
        }
        
        .content-block h4:first-child {
            margin-top: 0;
        }
        
        .content-block p,
        .content-block li {
            font-size: 14px;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        
        .content-block ul {
            padding-left: 20px;
            margin: 10px 0;
        }
        
        .content-block li {
            margin: 6px 0;
        }
        
        /* Discussion Log */
        .discussion-log {
            margin-top: 20px;
        }
        
        .discussion-item {
            display: flex;
            gap: 15px;
            padding: 15px;
            background: var(--bg-tertiary);
            border-radius: 10px;
            margin-bottom: 10px;
        }
        
        .discussion-time {
            font-size: 11px;
            color: var(--text-muted);
            white-space: nowrap;
        }
        
        .discussion-content {
            flex: 1;
        }
        
        .discussion-platform {
            font-size: 11px;
            color: var(--accent-blue);
            margin-bottom: 5px;
        }
        
        .discussion-summary {
            font-size: 13px;
            color: var(--text-secondary);
            margin-bottom: 8px;
        }
        
        .decision-tags {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        
        .decision-tag {
            padding: 3px 10px;
            background: rgba(52, 152, 219, 0.15);
            border: 1px solid var(--accent-blue);
            border-radius: 4px;
            font-size: 11px;
            color: var(--accent-blue);
        }
        
        /* Story Structure */
        .story-structure {
            display: grid;
            gap: 10px;
        }
        
        .story-phase {
            display: flex;
            gap: 15px;
            padding: 12px 15px;
            background: var(--bg-tertiary);
            border-radius: 8px;
        }
        
        .phase-info {
            min-width: 80px;
        }
        
        .phase-name {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .phase-time {
            font-size: 11px;
            color: var(--text-muted);
        }
        
        .phase-content {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        /* Character Cards */
        .character-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .character-card {
            background: var(--bg-tertiary);
            border-radius: 10px;
            padding: 15px;
        }
        
        .character-card .name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }
        
        .character-card .type {
            font-size: 11px;
            color: var(--accent-orange);
            margin-bottom: 8px;
        }
        
        .character-card .desc {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .empty-state-icon {
            font-size: 48px;
            margin-bottom: 15px;
            opacity: 0.5;
        }
        
        /* Loading */
        .loading {
            text-align: center;
            padding: 100px 20px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-primary);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* Reference Images */
        .reference-images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        
        .reference-image-item {
            background: var(--bg-tertiary);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid var(--border-primary);
        }
        
        .reference-image-item img {
            width: 100%;
            height: auto;
            display: block;
            border-bottom: 1px solid var(--border-primary);
        }
        
        .reference-image-item .image-info {
            padding: 15px;
        }
        
        .reference-image-item .image-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 5px;
        }
        
        .reference-image-item .image-desc {
            font-size: 12px;
            color: var(--text-secondary);
        }
        
        /* Footer */
        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--border-primary);
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        footer p {
            margin: 5px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="nav-top">
                <a href="./">← 返回首页</a>
                <button class="theme-btn" onclick="toggleTheme()">🌓 切换主题</button>
            </div>
        </header>
        
        <!-- Project Content -->
        <div id="projectContainer">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载项目中...</p>
            </div>
        </div>
        
        <!-- Footer -->
        <footer>
            <p>HIYAMAX AI Shortfilm Lab</p>
            <p>协作流程：飞书讨论 → 页面更新 → 确认 → 下一步</p>
        </footer>
    </div>
    
    <script>
        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        
        // Load theme
        (function() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
        
        // Get project from URL
        function getProjectId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('project') || 'pythagoras';
        }
        
        // Load project
        async function loadProject() {
            const projectId = getProjectId();
            const container = document.getElementById('projectContainer');
            
            try {
                const response = await fetch(`./pipeline/data/${projectId}.json?t=${Date.now()}`);
                if (!response.ok) throw new Error('Project not found');
                const data = await response.json();
                renderProject(data);
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">❌</div>
                        <p>加载失败：${error.message}</p>
                    </div>
                `;
            }
        }
        
        // Render project
        function renderProject(data) {
            const container = document.getElementById('projectContainer');
            
            let html = '';
            
            // Project Header
            html += `
                <div class="project-header">
                    <div class="project-title-row">
                        <span class="project-emoji">${data.emoji}</span>
                        <div class="project-title-text">
                            <h1>${data.title}</h1>
                            <p>${data.subtitle}</p>
                        </div>
                    </div>
                    <div class="project-meta">
                        <span>🎬 ${data.type}</span>
                        <span>⏱️ ${data.duration}</span>
                        <span>📅 ${data.createdAt}</span>
                        <span class="status-badge status-${getStatusClass(data.status)}">${data.status}</span>
                    </div>
                </div>
                
                <div class="quick-nav">
                    ${data.steps.map((step, i) => `
                        <a href="#step-${step.number}" class="${step.status !== '待开始' ? 'active' : ''}">
                            ${step.number}. ${step.title}
                        </a>
                    `).join('')}
                </div>
            `;
            
            // Steps
            data.steps.forEach(step => {
                html += renderStep(step);
            });
            
            container.innerHTML = html;
        }
        
        function getStatusClass(status) {
            const map = { '讨论中': 'discussing', '已完成': 'completed', '待开始': 'pending' };
            return map[status] || 'pending';
        }
        
        // Render step
        function renderStep(step) {
            if (step.status === '待开始') {
                return `
                    <div class="step-section" id="step-${step.number}">
                        <div class="step-header">
                            <div class="step-title-group">
                                <div class="step-number">${step.number}</div>
                                <div>
                                    <h2>${step.title}</h2>
                                    <p>${step.desc}</p>
                                </div>
                            </div>
                            <span class="status-badge status-pending">待开始</span>
                        </div>
                        <div class="step-body">
                            <div class="empty-state">
                                <div class="empty-state-icon">⏳</div>
                                <p>等待上一步完成后开始...</p>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            const content = step.content;
            const currentVer = content.currentVersion;
            const versions = content.versions || [];
            const discussions = content.discussions || [];
            
            return `
                <div class="step-section" id="step-${step.number}">
                    <div class="step-header">
                        <div class="step-title-group">
                            <div class="step-number">${step.number}</div>
                            <div>
                                <h2>${step.title}</h2>
                                <p>${step.desc}</p>
                            </div>
                        </div>
                        <span class="status-badge status-${getStatusClass(step.status)}">${step.status}</span>
                    </div>
                    
                    <div class="step-body">
                        ${versions.length > 0 ? `
                            <div class="version-tabs">
                                ${versions.map(v => `
                                    <button class="version-tab ${v.version === currentVer ? 'active' : ''} ${v.status === '已废弃' ? 'obsolete' : ''}"
                                            onclick="switchVersion('${step.number}', '${v.version}')"
                                            data-version="${v.version}"
                                            data-step="${step.number}">
                                        ${v.version}
                                    </button>
                                `).join('')}
                            </div>
                            
                            <div id="version-content-${step.number}">
                                ${renderVersionContent(versions.find(v => v.version === currentVer))}
                            </div>
                        ` : ''}
                        
                        ${discussions.length > 0 ? `
                            <div class="content-block discussion-log">
                                <h3>💬 讨论记录（从飞书同步）</h3>
                                ${discussions.map(d => `
                                    <div class="discussion-item">
                                        <div class="discussion-time">${d.date}</div>
                                        <div class="discussion-content">
                                            <div class="discussion-platform">📱 ${d.platform}</div>
                                            <div class="discussion-summary">${d.summary}</div>
                                            <div class="decision-tags">
                                                ${d.decisions.map(dec => `<span class="decision-tag">${dec}</span>`).join('')}
                                            </div>
                                        </div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                </div>
            `;
        }
        
        // Render version content
        function renderVersionContent(version) {
            if (!version) return '';
            
            const data = version.data;
            let html = '';
            
            // Version info
            html += `
                <div class="content-block">
                    <h3>📋 版本信息</h3>
                    <p><strong>版本：</strong>${version.version} | <strong>状态：</strong>${version.status} | <strong>时间：</strong>${version.date} | <strong>作者：</strong>${version.author}</p>
                    ${version.changes ? `<p><strong>变更：</strong>${version.changes}</p>` : ''}
                </div>
            `;
            
            // Concept
            if (data.concept) {
                html += `
                    <div class="content-block">
                        <h3>💡 核心概念</h3>
                        <p>${data.concept}</p>
                        ${data.target ? `<h4>目标受众</h4><p>${data.target}</p>` : ''}
                        ${data.references ? `
                            <h4>参考作品</h4>
                            <ul>${data.references.map(r => `<li>${r}</li>`).join('')}</ul>
                        ` : ''}
                    </div>
                `;
            }
            
            // Decisions
            if (data.decisions) {
                html += `
                    <div class="content-block">
                        <h3>✅ 关键决策</h3>
                        <ul>${data.decisions.map(d => `<li>${d}</li>`).join('')}</ul>
                    </div>
                `;
            }
            
            // Story
            if (data.story) {
                html += `
                    <div class="content-block">
                        <h3>🎬 故事内容</h3>
                        ${data.story.core ? `<h4>故事核心</h4><p>${data.story.core}</p>` : ''}
                        
                        ${data.story.characters ? `
                            <h4>角色设定</h4>
                            <div class="character-grid">
                                ${data.story.characters.map(c => `
                                    <div class="character-card">
                                        <div class="name">${c.name}</div>
                                        <div class="type">${c.type}</div>
                                        <div class="desc">${c.desc}</div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                        
                        ${data.story.structure ? `
                            <h4>故事结构</h4>
                            <div class="story-structure">
                                ${data.story.structure.map(s => `
                                    <div class="story-phase">
                                        <div class="phase-info">
                                            <div class="phase-name">${s.phase}</div>
                                            <div class="phase-time">${s.time}</div>
                                        </div>
                                        <div class="phase-content">${s.content}</div>
                                    </div>
                                `).join('')}
                            </div>
                        ` : ''}
                    </div>
                `;
            }
            
            // Key moments
            if (data.keyMoments) {
                html += `
                    <div class="content-block">
                        <h3>🎯 关键记忆点</h3>
                        <ul>${data.keyMoments.map(m => `<li>${m}</li>`).join('')}</ul>
                    </div>
                `;
            }
            
            // Reference Images (for character design step)
            if (data.referenceImages && data.referenceImages.length > 0) {
                html += `
                    <div class="content-block">
                        <h3>🖼️ 参考图片</h3>
                        <div class="reference-images">
                            ${data.referenceImages.map(img => `
                                <div class="reference-image-item">
                                    <img src="${img.src}" alt="${img.title}" loading="lazy">
                                    <div class="image-info">
                                        <div class="image-title">${img.title}</div>
                                        ${img.desc ? `<div class="image-desc">${img.desc}</div>` : ''}
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }
            
            return html;
        }
        
        // Switch version
        function switchVersion(stepNumber, versionId) {
            // Update tabs
            document.querySelectorAll(`.version-tab[data-step="${stepNumber}"]`).forEach(tab => {
                tab.classList.remove('active');
                if (tab.dataset.version === versionId) {
                    tab.classList.add('active');
                }
            });
            
            // Reload project to get new content
            loadProject();
        }
        
        // Initialize
        document.addEventListener('DOMContentLoaded', loadProject);
    </script>
</body>
</html>
