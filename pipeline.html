<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI短片制作Pipeline | HIYAMAX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111;
            --bg-tertiary: #1a1a1a;
            --bg-card: #151515;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --text-muted: #666;
            --border-primary: #333;
            --border-secondary: #222;
            --accent-red: #e74c3c;
            --accent-blue: #3498db;
            --accent-green: #27ae60;
            --accent-orange: #f39c12;
            --accent-purple: #9b59b6;
            --status-discussing: #f39c12;
            --status-completed: #27ae60;
            --status-pending: #666;
        }
        
        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #fff;
            --bg-tertiary: #f0f0f0;
            --bg-card: #fafafa;
            --text-primary: #000;
            --text-secondary: #444;
            --text-muted: #888;
            --border-primary: #ddd;
            --border-secondary: #eee;
            --accent-red: #c0392b;
            --accent-blue: #2980b9;
            --accent-green: #229954;
            --accent-orange: #d68910;
            --accent-purple: #8e44ad;
            --status-discussing: #d68910;
            --status-completed: #229954;
            --status-pending: #888;
        }
        
        body {
            font-family: 'Noto+Sans+SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* Header */
        header {
            margin-bottom: 30px;
        }
        
        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-primary);
            margin-bottom: 30px;
        }
        
        .nav-top a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        
        .nav-top a:hover {
            color: var(--accent-blue);
        }
        
        .nav-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }
        
        .help-btn {
            background: rgba(52, 152, 219, 0.15);
            border: 1px solid var(--accent-blue);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--accent-blue);
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .help-btn:hover {
            background: var(--accent-blue);
            color: #fff;
        }
        
        .theme-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .theme-btn:hover {
            border-color: var(--accent-blue);
        }
        
        .page-title {
            text-align: center;
            margin-bottom: 10px;
        }
        
        .page-title h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .page-title p {
            color: var(--text-muted);
            font-size: 14px;
        }
        
        /* Project List */
        .project-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .project-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-blue);
            box-shadow: 0 8px 30px rgba(52, 152, 219, 0.15);
        }
        
        .project-cover {
            height: 160px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            position: relative;
            overflow: hidden;
        }
        
        .project-cover img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .project-cover .emoji-fallback {
            opacity: 0.5;
        }
        
        .project-status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .project-status-badge.completed {
            background: rgba(39, 174, 96, 0.2);
            color: var(--accent-green);
        }
        
        .project-status-badge.pending {
            background: rgba(102, 102, 102, 0.2);
            color: var(--text-muted);
        }
        
        .project-status-badge.discussing {
            background: rgba(243, 156, 18, 0.2);
            color: var(--accent-orange);
        }
        
        .project-info {
            padding: 20px;
        }
        
        .project-meta-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .project-meta-row span {
            display: flex;
            align-items: center;
            gap: 4px;
        }
        
        .project-title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 6px;
            color: var(--text-primary);
        }
        
        .project-subtitle {
            font-size: 13px;
            color: var(--text-secondary);
            line-height: 1.5;
            margin-bottom: 15px;
        }
        
        .project-progress {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-blue));
            border-radius: 3px;
            transition: width 0.5s;
        }
        
        .progress-text {
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }
        
        /* Project Detail Styles */
        .back-nav {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .back-nav:hover {
            background: var(--border-primary);
            color: var(--text-primary);
        }
        
        .project-header {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .project-title-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .project-emoji {
            font-size: 40px;
        }
        
        .project-title-text h1 {
            font-size: 22px;
            font-weight: 700;
            margin-bottom: 4px;
        }
        
        .project-title-text p {
            font-size: 13px;
            color: var(--text-secondary);
        }
        
        .project-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-completed {
            background: rgba(39, 174, 96, 0.15);
            color: var(--accent-green);
        }
        
        .status-discussing {
            background: rgba(243, 156, 18, 0.15);
            color: var(--accent-orange);
        }
        
        .status-pending {
            background: rgba(102, 102, 102, 0.15);
            color: var(--text-muted);
        }
        
        .quick-nav {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-primary);
        }
        
        .quick-nav a {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .quick-nav a:hover {
            background: var(--border-primary);
            color: var(--text-primary);
        }
        
        .quick-nav a.active {
            background: linear-gradient(135deg, var(--accent-red), var(--accent-blue));
            color: #fff;
        }
        
        .step-section {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .step-header {
            padding: 20px 25px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .step-title-group {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .step-number {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-red), var(--accent-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
        }
        
        .step-title-group h2 {
            font-size: 18px;
            font-weight: 600;
        }
        
        .step-title-group p {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 2px;
        }
        
        .step-body {
            padding: 25px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
        }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-primary);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--border-primary);
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        @media (max-width: 768px) {
            .project-list {
                grid-template-columns: 1fr;
            }
            
            .nav-top {
                flex-wrap: wrap;
                gap: 10px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header>
            <div class="nav-top">
                <a href="./">← 返回首页</a>
                <div class="nav-actions">
                    <a href="./workflow-manual.html" class="help-btn">❓ 帮助</a>
                    <button class="theme-btn" onclick="toggleTheme()">🌓 切换主题</button>
                </div>
            </div>
        </header>
        
        <!-- Content -->
        <div id="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
        
        <!-- Footer -->
        <footer>
            <p>HIYAMAX AI Shortfilm Lab · Pipeline v2.0</p>
            <p>协作流程：飞书讨论 → Pipeline记录 → AI执行 → Web呈现 → 飞书确认</p>
        </footer>
    </div>
    
    <script>
        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        
        // Load theme
        (function() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.documentElement.setAttribute('data-theme', saved);
        })();
        
        // Get project from URL
        function getProjectId() {
            const params = new URLSearchParams(window.location.search);
            return params.get('project');
        }
        
        // Load and render
        async function init() {
            const projectId = getProjectId();
            const container = document.getElementById('content');
            
            if (projectId) {
                // Show project detail
                await loadProjectDetail(projectId, container);
            } else {
                // Show project list
                await loadProjectList(container);
            }
        }
        
        // Load project list
        async function loadProjectList(container) {
            try {
                const response = await fetch('./pipeline/projects.json?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to load projects');
                const projects = await response.json();
                renderProjectList(projects, container);
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 15px;">❌</div>
                        <p>加载失败：${error.message}</p>
                    </div>
                `;
            }
        }
        
        // Render project list
        function renderProjectList(projects, container) {
            let html = `
                <div class="page-title">
                    <h1>🎬 AI短片制作Pipeline</h1>
                    <p>选择项目查看详细制作流程</p>
                </div>
                <div class="project-list">
            `;
            
            projects.forEach(p => {
                const progress = Math.round((p.currentStep / p.totalSteps) * 100);
                const statusClass = p.status === '已发布' ? 'completed' : 
                                   p.status === '进行中' ? 'discussing' : 'pending';
                
                html += `
                    <a href="?project=${p.id}" class="project-card">
                        <div class="project-cover">
                            ${p.cover ? `<img src="${p.cover}" alt="${p.title}" onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=\'emoji-fallback\'>${p.emoji}</span>';">` : `<span class="emoji-fallback">${p.emoji}</span>`}
                            <span class="project-status-badge ${statusClass}">${p.status}</span>
                        </div>
                        <div class="project-info">
                            <div class="project-meta-row">
                                <span>🎬 ${p.type}</span>
                                <span>⏱️ ${p.duration}</span>
                                <span>📅 ${p.createdAt}</span>
                            </div>
                            <h3 class="project-title">${p.title}</h3>
                            <p class="project-subtitle">${p.subtitle}</p>
                            <div class="project-progress">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${progress}%"></div>
                                </div>
                                <span class="progress-text">Step ${p.currentStep}/${p.totalSteps}</span>
                            </div>
                        </div>
                    </a>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        // Load project detail
        async function loadProjectDetail(projectId, container) {
            try {
                const response = await fetch(`./pipeline/data/${projectId}.json?t=${Date.now()}`);
                if (!response.ok) throw new Error('Project not found');
                const data = await response.json();
                renderProjectDetail(data, container);
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 15px;">❌</div>
                        <p>加载失败：${error.message}</p>
                        <a href="pipeline.html" class="back-nav" style="margin-top: 20px;">← 返回项目列表</a>
                    </div>
                `;
            }
        }
        
        // Render project detail (simplified version)
        function renderProjectDetail(data, container) {
            const statusClass = data.status === '已发布' ? 'completed' : 
                               data.status === '进行中' ? 'discussing' : 'pending';
            
            let html = `
                <a href="pipeline.html" class="back-nav">← 返回项目列表</a>
                
                <div class="project-header">
                    <div class="project-title-row">
                        <span class="project-emoji">${data.emoji}</span>
                        <div class="project-title-text">
                            <h1>${data.title}</h1>
                            <p>${data.subtitle}</p>
                        </div>
                    </div>
                    <div class="project-meta">
                        <span>🎬 ${data.type}</span>
                        <span>⏱️ ${data.duration}</span>
                        <span>📅 ${data.createdAt}</span>
                        <span class="status-badge status-${statusClass}">${data.status}</span>
                    </div>
                </div>
                
                <div class="quick-nav">
                    ${data.steps.map((step, i) => `
                        <a href="#step-${step.number}" class="${step.status !== '待开始' ? 'active' : ''}">
                            ${step.number}. ${step.title}
                        </a>
                    `).join('')}
                </div>
            `;
            
            // Steps
            data.steps.forEach(step => {
                html += renderStep(step);
            });
            
            container.innerHTML = html;
        }
        
        // Render step (simplified)
        function renderStep(step) {
            const statusClass = step.status === '已完成' ? 'completed' : 
                               step.status === '进行中' ? 'discussing' : 'pending';
            
            return `
                <div class="step-section" id="step-${step.number}">
                    <div class="step-header">
                        <div class="step-title-group">
                            <div class="step-number">${step.number}</div>
                            <div>
                                <h2>${step.title}</h2>
                                <p>${step.desc}</p>
                            </div>
                        </div>
                        <span class="status-badge status-${statusClass}">${step.status}</span>
                    </div>
                    <div class="step-body">
                        <p style="color: var(--text-muted);">详细内容加载中...</p>
                    </div>
                </div>
            `;
        }
        
        // Init
        init();
    </script>
</body>
</html>
