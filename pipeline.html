<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI短片制作Pipeline | HIYAMAX</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700;900&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #111;
            --bg-tertiary: #1a1a1a;
            --bg-card: #151515;
            --text-primary: #fff;
            --text-secondary: #aaa;
            --text-muted: #666;
            --border-primary: #333;
            --border-secondary: #222;
            --accent-red: #e74c3c;
            --accent-blue: #3498db;
            --accent-green: #27ae60;
            --accent-orange: #f39c12;
            --accent-purple: #9b59b6;
            --status-discussing: #f39c12;
            --status-completed: #27ae60;
            --status-pending: #666;
        }
        
        [data-theme="light"] {
            --bg-primary: #f5f5f5;
            --bg-secondary: #fff;
            --bg-tertiary: #f0f0f0;
            --bg-card: #fafafa;
            --text-primary: #000;
            --text-secondary: #444;
            --text-muted: #888;
            --border-primary: #ddd;
            --border-secondary: #eee;
            --accent-red: #c0392b;
            --accent-blue: #2980b9;
            --accent-green: #229954;
            --accent-orange: #d68910;
            --accent-purple: #8e44ad;
            --status-discussing: #d68910;
            --status-completed: #229954;
            --status-pending: #888;
        }
        
        body {
            font-family: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 30px 20px;
        }
        
        /* Header */
        header { margin-bottom: 30px; }
        
        .nav-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px solid var(--border-primary);
            margin-bottom: 30px;
        }
        
        .nav-top a {
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }
        
        .nav-top a:hover { color: var(--accent-blue); }
        
        .nav-actions { display: flex; gap: 12px; align-items: center; }
        
        .help-btn {
            background: rgba(52, 152, 219, 0.15);
            border: 1px solid var(--accent-blue);
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            color: var(--accent-blue);
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .help-btn:hover { background: var(--accent-blue); color: #fff; }
        
        .theme-btn {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            color: var(--text-secondary);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        
        .theme-btn:hover { border-color: var(--accent-blue); }
        
        .page-title { text-align: center; margin-bottom: 10px; }
        
        .page-title h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .page-title p { color: var(--text-muted); font-size: 14px; }
        
        /* Project List */
        .project-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .project-card {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: block;
        }
        
        .project-card:hover {
            transform: translateY(-4px);
            border-color: var(--accent-blue);
            box-shadow: 0 8px 30px rgba(52, 152, 219, 0.15);
        }
        
        .project-cover {
            height: 160px;
            background: var(--bg-tertiary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 64px;
            position: relative;
            overflow: hidden;
        }
        
        .project-cover img { width: 100%; height: 100%; object-fit: cover; }
        .project-cover .emoji-fallback { opacity: 0.5; }
        
        .project-status-badge {
            position: absolute;
            top: 12px;
            right: 12px;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        
        .project-status-badge.completed { background: rgba(39, 174, 96, 0.2); color: var(--accent-green); }
        .project-status-badge.pending { background: rgba(102, 102, 102, 0.2); color: var(--text-muted); }
        .project-status-badge.discussing { background: rgba(243, 156, 18, 0.2); color: var(--accent-orange); }
        
        .project-info { padding: 20px; }
        
        .project-meta-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        .project-title { font-size: 17px; font-weight: 600; margin-bottom: 6px; color: var(--text-primary); }
        .project-subtitle { font-size: 13px; color: var(--text-secondary); line-height: 1.5; margin-bottom: 15px; }
        
        .project-progress { display: flex; align-items: center; gap: 10px; }
        
        .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--bg-tertiary);
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent-red), var(--accent-blue));
            border-radius: 3px;
            transition: width 0.5s;
        }
        
        .progress-text { font-size: 12px; color: var(--text-muted); font-weight: 500; }
        
        /* Project Detail */
        .back-nav {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 14px;
            margin-bottom: 20px;
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 8px;
            transition: all 0.2s;
        }
        
        .back-nav:hover { background: var(--border-primary); color: var(--text-primary); }
        
        .project-header {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            padding: 25px;
            margin-bottom: 25px;
        }
        
        .project-title-row {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 15px;
        }
        
        .project-emoji { font-size: 40px; }
        
        .project-title-text h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
        .project-title-text p { font-size: 13px; color: var(--text-secondary); }
        
        .project-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 13px;
            color: var(--text-muted);
        }
        
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        .status-completed { background: rgba(39, 174, 96, 0.15); color: var(--accent-green); }
        .status-discussing { background: rgba(243, 156, 18, 0.15); color: var(--accent-orange); }
        .status-pending { background: rgba(102, 102, 102, 0.15); color: var(--text-muted); }
        
        .quick-nav {
            display: flex;
            gap: 10px;
            overflow-x: auto;
            padding: 15px 0;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-primary);
        }
        
        .quick-nav a {
            padding: 8px 16px;
            background: var(--bg-tertiary);
            border-radius: 20px;
            font-size: 13px;
            color: var(--text-muted);
            text-decoration: none;
            white-space: nowrap;
            transition: all 0.2s;
        }
        
        .quick-nav a:hover { background: var(--border-primary); color: var(--text-primary); }
        .quick-nav a.active { background: linear-gradient(135deg, var(--accent-red), var(--accent-blue)); color: #fff; }
        
        /* Step Section - Collapsible */
        .step-section {
            background: var(--bg-card);
            border: 1px solid var(--border-primary);
            border-radius: 16px;
            margin-bottom: 20px;
            overflow: hidden;
        }
        
        .step-header {
            padding: 20px 25px;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-primary);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: background 0.2s;
            user-select: none;
        }
        
        .step-header:hover { background: var(--bg-tertiary); }
        .step-header.collapsed { border-bottom: none; }
        
        .step-header .toggle-icon {
            font-size: 18px;
            color: var(--text-muted);
            transition: transform 0.3s;
            margin-left: 10px;
        }
        
        .step-header.collapsed .toggle-icon { transform: rotate(-90deg); }
        
        .step-title-group {
            display: flex;
            align-items: center;
            gap: 15px;
            flex: 1;
        }
        
        .step-number {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-red), var(--accent-blue));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .step-title-group h2 { font-size: 18px; font-weight: 600; }
        .step-title-group p { font-size: 12px; color: var(--text-muted); margin-top: 2px; }
        
        .step-body {
            padding: 25px;
            display: block;
            animation: fadeIn 0.3s ease;
        }
        
        .step-body.collapsed { display: none; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Version Tabs */
        .version-tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 20px;
            border-bottom: 1px solid var(--border-primary);
            padding-bottom: 15px;
        }
        
        .version-tab {
            padding: 6px 14px;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-primary);
            border-radius: 6px;
            font-size: 12px;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .version-tab:hover { border-color: var(--accent-blue); }
        .version-tab.active { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
        .version-tab.obsolete { opacity: 0.5; text-decoration: line-through; }
        
        /* Content Blocks */
        .content-block {
            background: var(--bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .content-block h3 {
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-secondary);
        }
        
        .content-block h4 { font-size: 14px; color: var(--text-primary); margin: 15px 0 8px; }
        .content-block p { font-size: 14px; color: var(--text-secondary); line-height: 1.7; margin-bottom: 10px; }
        .content-block ul { margin: 10px 0; padding-left: 20px; }
        .content-block li { font-size: 14px; color: var(--text-secondary); margin: 6px 0; }
        
        /* AI Tool Tags */
        .ai-tool-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin: 10px 0;
        }
        
        .ai-tool-tag {
            background: rgba(155, 89, 182, 0.15);
            border: 1px solid rgba(155, 89, 182, 0.3);
            color: var(--accent-purple);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        
        /* Decision Tags */
        .decision-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 10px;
        }
        
        .decision-tag {
            background: rgba(52, 152, 219, 0.15);
            border: 1px solid rgba(52, 152, 219, 0.3);
            color: var(--accent-blue);
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 12px;
        }
        
        /* Discussion Cards */
        .discussion-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .discussion-card {
            background: var(--bg-tertiary);
            border-radius: 10px;
            padding: 15px;
            border-left: 3px solid var(--accent-green);
        }
        
        .discussion-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 8px;
        }
        
        .discussion-date { font-size: 12px; color: var(--text-muted); }
        
        .discussion-platform {
            background: var(--bg-card);
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            color: var(--text-secondary);
        }
        
        .discussion-summary { font-size: 14px; color: var(--text-secondary); margin-bottom: 10px; }
        
        /* Reference Images - Clickable */
        .reference-images {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 15px;
        }
        
        .reference-image-item {
            background: var(--bg-tertiary);
            border-radius: 10px;
            overflow: hidden;
            transition: transform 0.2s;
        }
        
        .reference-image-item:hover { transform: translateY(-2px); }
        
        .reference-image-item a {
            display: block;
            text-decoration: none;
            color: inherit;
        }
        
        .reference-image-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
            transition: opacity 0.2s;
        }
        
        .reference-image-item:hover img { opacity: 0.9; }
        
        .reference-image-item .image-info { padding: 12px; }
        .reference-image-item .image-title { font-size: 13px; font-weight: 600; color: var(--text-primary); margin-bottom: 4px; }
        .reference-image-item .image-desc { font-size: 12px; color: var(--text-secondary); }
        .reference-image-item .download-link {
            display: inline-block;
            margin-top: 8px;
            font-size: 11px;
            color: var(--accent-blue);
            text-decoration: none;
        }
        
        .reference-image-item .download-link:hover { text-decoration: underline; }
        
        /* Scene Cards - Full width image cards like reference */
        .scene-cards {
            display: flex;
            flex-direction: column;
            gap: 20px;
            margin-top: 15px;
        }
        
        .scene-card {
            background: var(--bg-tertiary);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        .scene-card:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        
        .scene-card a {
            display: block;
            text-decoration: none;
            color: inherit;
        }
        
        .scene-card img {
            width: 100%;
            height: auto;
            max-height: 400px;
            object-fit: cover;
            display: block;
            transition: opacity 0.2s;
        }
        
        .scene-card:hover img { opacity: 0.95; }
        
        .scene-card .image-info { 
            padding: 16px 18px; 
            background: var(--bg-tertiary);
        }
        
        .scene-card .image-title { 
            font-size: 15px; 
            font-weight: 600; 
            color: var(--text-primary); 
            margin-bottom: 6px; 
        }
        
        .scene-card .image-desc { 
            font-size: 13px; 
            color: var(--text-secondary); 
            line-height: 1.5;
            margin-bottom: 4px;
        }
        
        .scene-card .image-meta {
            font-size: 12px;
            color: var(--text-muted);
            margin-top: 6px;
        }
        
        .scene-card .download-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 10px;
            font-size: 12px;
            color: var(--accent-blue);
            text-decoration: none;
            padding: 6px 12px;
            background: rgba(52, 152, 219, 0.1);
            border-radius: 6px;
            transition: background 0.2s;
        }
        
        .scene-card .download-link:hover { 
            background: rgba(52, 152, 219, 0.2);
            text-decoration: none;
        }
        
        /* Video Container - Clickable */
        .video-container {
            background: var(--bg-tertiary);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 15px;
        }
        
        .video-container video {
            width: 100%;
            max-height: 400px;
            display: block;
            background: #000;
        }
        
        .video-info { padding: 15px; }
        .video-info h4 { font-size: 14px; color: var(--text-primary); margin-bottom: 8px; }
        .video-info p { font-size: 13px; color: var(--text-secondary); margin-bottom: 10px; }
        
        .video-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 10px;
        }
        
        .video-actions {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .video-actions a {
            padding: 6px 12px;
            background: rgba(52, 152, 219, 0.15);
            border: 1px solid rgba(52, 152, 219, 0.3);
            border-radius: 6px;
            font-size: 12px;
            color: var(--accent-blue);
            text-decoration: none;
            transition: all 0.2s;
        }
        
        .video-actions a:hover { background: var(--accent-blue); color: #fff; }
        
        /* Empty State */
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .loading { text-align: center; padding: 60px 20px; }
        
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid var(--border-primary);
            border-top-color: var(--accent-blue);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin { to { transform: rotate(360deg); } }
        
        footer {
            text-align: center;
            padding: 40px 20px;
            border-top: 1px solid var(--border-primary);
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-muted);
        }
        
        @media (max-width: 768px) {
            .project-list { grid-template-columns: 1fr; }
            .nav-top { flex-wrap: wrap; gap: 10px; }
            .step-header { padding: 15px 20px; }
            .step-title-group h2 { font-size: 16px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="nav-top">
                <a href="./">← 返回首页</a>
                <div class="nav-actions">
                    <a href="./workflow-manual.html" class="help-btn">❓ 帮助</a>
                    <button class="theme-btn" onclick="toggleTheme()">🌓 切换主题</button>
                </div>
            </div>
        </header>
        
        <div id="content">
            <div class="loading">
                <div class="loading-spinner"></div>
                <p>加载中...</p>
            </div>
        </div>
        
        <footer>
            <p>HIYAMAX AI Shortfilm Lab · Pipeline v2.1</p>
            <p>协作流程：飞书讨论 → Pipeline记录 → AI执行 → Web呈现 → 飞书确认</p>
        </footer>
    </div>
    
    <script>
        // Theme toggle
        function toggleTheme() {
            const html = document.documentElement;
            const current = html.getAttribute('data-theme');
            const next = current === 'light' ? 'dark' : 'light';
            html.setAttribute('data-theme', next);
            localStorage.setItem('theme', next);
        }
        
        (function() {
            const saved = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', saved);
        })();
        
        function getProjectId() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('project');
            return id ? id.replace(/-/g, '_') : null;
        }
        
        async function init() {
            const projectId = getProjectId();
            const container = document.getElementById('content');
            
            if (projectId) {
                await loadProjectDetail(projectId, container);
            } else {
                await loadProjectList(container);
            }
        }
        
        async function loadProjectList(container) {
            try {
                const response = await fetch('./pipeline/projects.json?t=' + Date.now());
                if (!response.ok) throw new Error('Failed to load projects');
                const projects = await response.json();
                renderProjectList(projects, container);
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 15px;">❌</div>
                        <p>加载失败：${error.message}</p>
                    </div>
                `;
            }
        }
        
        function renderProjectList(projects, container) {
            let html = `
                <div class="page-title">
                    <h1>🎬 AI短片制作Pipeline</h1>
                    <p>选择项目查看详细制作流程</p>
                </div>
                <div class="project-list">
            `;
            
            projects.forEach(p => {
                const progress = Math.round((p.currentStep / p.totalSteps) * 100);
                const statusClass = p.status === '已发布' ? 'completed' : 
                                   p.status === '进行中' ? 'discussing' : 'pending';
                
                html += `
                    <a href="?project=${p.id.replace(/_/g, '-')}" class="project-card">
                        <div class="project-cover">
                            ${p.cover ? `<img src="${p.cover}" alt="${p.title}" onerror="this.style.display='none'; this.parentNode.innerHTML='<span class=\'emoji-fallback\'>${p.emoji}</span>';">` : `<span class="emoji-fallback">${p.emoji}</span>`}
                            <span class="project-status-badge ${statusClass}">${p.status}</span>
                        </div>
                        <div class="project-info">
                            <div class="project-meta-row">
                                <span>🎬 ${p.type}</span>
                                <span>⏱️ ${p.duration}</span>
                                <span>📅 ${p.createdAt}</span>
                            </div>
                            <h3 class="project-title">${p.title}</h3>
                            <p class="project-subtitle">${p.subtitle}</p>
                            <div class="project-progress">
                                <div class="progress-bar">
                                    <div class="progress-fill" style="width: ${progress}%"></div>
                                </div>
                                <span class="progress-text">Step ${p.currentStep}/${p.totalSteps}</span>
                            </div>
                        </div>
                    </a>
                `;
            });
            
            html += '</div>';
            container.innerHTML = html;
        }
        
        async function loadProjectDetail(projectId, container) {
            try {
                const response = await fetch(`./pipeline/data/${projectId}.json?t=${Date.now()}`);
                if (!response.ok) throw new Error('Project not found');
                const data = await response.json();
                renderProjectDetail(data, container);
            } catch (error) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div style="font-size: 48px; margin-bottom: 15px;">❌</div>
                        <p>加载失败：${error.message}</p>
                        <a href="pipeline.html" class="back-nav" style="margin-top: 20px;">← 返回项目列表</a>
                    </div>
                `;
            }
        }
        
        function renderProjectDetail(data, container) {
            window.currentProjectData = data;
            
            const statusClass = data.status === '已发布' ? 'completed' : 
                               data.status === '进行中' ? 'discussing' : 'pending';
            
            let html = `
                <a href="pipeline.html" class="back-nav">← 返回项目列表</a>
                
                <div class="project-header">
                    <div class="project-title-row">
                        <span class="project-emoji">${data.emoji}</span>
                        <div class="project-title-text">
                            <h1>${data.title}</h1>
                            <p>${data.subtitle}</p>
                        </div>
                    </div>
                    <div class="project-meta">
                        <span>🎬 ${data.type}</span>
                        <span>⏱️ ${data.duration}</span>
                        <span>📅 ${data.createdAt}</span>
                        <span class="status-badge status-${statusClass}">${data.status}</span>
                    </div>
                </div>
                
                <div class="quick-nav">
                    ${data.steps.map((step, i) => `
                        <a href="#step-${step.number}" class="${step.status !== '待开始' ? 'active' : ''}">
                            ${step.number}. ${step.title}
                        </a>
                    `).join('')}
                </div>
            `;
            
            data.steps.forEach(step => {
                html += renderStep(step);
            });
            
            container.innerHTML = html;
            
            // Add click handlers for collapsible sections
            document.querySelectorAll('.step-header').forEach(header => {
                header.addEventListener('click', function() {
                    const stepSection = this.closest('.step-section');
                    const stepBody = stepSection.querySelector('.step-body');
                    const isCollapsed = stepBody.classList.contains('collapsed');
                    
                    // Toggle current section
                    stepBody.classList.toggle('collapsed', !isCollapsed);
                    this.classList.toggle('collapsed', !isCollapsed);
                });
            });
        }
        
        function renderStep(step) {
            const statusClass = step.status === '已完成' ? 'completed' : 
                               step.status === '进行中' ? 'discussing' : 'pending';
            
            let html = `
                <div class="step-section" id="step-${step.number}" data-step="${step.number}">
                    <div class="step-header collapsed">
                        <div class="step-title-group">
                            <div class="step-number">${step.number}</div>
                            <div>
                                <h2>${step.title}</h2>
                                <p>${step.desc}</p>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <span class="status-badge status-${statusClass}">${step.status}</span>
                            <span class="toggle-icon">▼</span>
                        </div>
                    </div>
                    <div class="step-body collapsed">
            `;
            
            if (step.content && step.content.versions && step.content.versions.length > 0) {
                html += `<div class="version-tabs">`;
                step.content.versions.forEach((v, i) => {
                    const isActive = v.status === '当前版本';
                    const isObsolete = v.status === '已归档';
                    html += `<button class="version-tab ${isActive ? 'active' : ''} ${isObsolete ? 'obsolete' : ''}" onclick="switchVersion(${step.number}, ${i})">${v.version}</button>`;
                });
                html += `</div>`;
                
                html += `<div class="version-content" id="step-${step.number}-content">`;
                html += renderVersionContent(step.content.versions.find(v => v.status === '当前版本') || step.content.versions[0], step.number);
                html += `</div>`;
                
                if (step.content.discussions && step.content.discussions.length > 0) {
                    html += renderDiscussions(step.content.discussions);
                }
            } else {
                html += `<p style="color: var(--text-muted);">暂无详细内容</p>`;
            }
            
            html += `</div></div>`;
            return html;
        }
        
        function renderVersionContent(version, stepNum) {
            const data = version.data || {};
            let html = '';
            
            // AI Tool Tags
            if (data.tool || data.apiProvider) {
                html += `<div class="content-block"><h3>🤖 AI工具</h3><div class="ai-tool-tags">`;
                if (data.tool) html += `<span class="ai-tool-tag">${data.tool}</span>`;
                if (data.apiProvider) html += `<span class="ai-tool-tag">${data.apiProvider}</span>`;
                html += `</div></div>`;
            }
            
            // Version info
            html += `
                <div class="content-block">
                    <h3>📋 版本信息</h3>
                    <p><strong>版本：</strong>${version.version} | <strong>状态：</strong>${version.status} | <strong>时间：</strong>${version.date} | <strong>作者：</strong>${version.author}</p>
                    <p><strong>变更：</strong>${version.changes}</p>
                </div>
            `;
            
            // Concept / Core
            if (data.concept || data.core) {
                html += `
                    <div class="content-block">
                        <h3>💡 核心概念</h3>
                        <p>${data.concept || data.core}</p>
                    </div>
                `;
            }
            
            // Story structure
            if (data.story) {
                html += `<div class="content-block"><h3>📝 故事结构</h3>`;
                if (data.story.core) html += `<p>${data.story.core}</p>`;
                if (data.story.characters) {
                    html += `<h4>角色</h4><ul>`;
                    data.story.characters.forEach(c => {
                        html += `<li><strong>${c.name}</strong> (${c.type}) - ${c.desc}</li>`;
                    });
                    html += `</ul>`;
                }
                if (data.story.structure) {
                    html += `<h4>结构</h4><ul>`;
                    data.story.structure.forEach(s => {
                        html += `<li><strong>${s.phase}</strong> (${s.time}) - ${s.content}</li>`;
                    });
                    html += `</ul>`;
                }
                html += `</div>`;
            }
            
            // Features / Decisions
            if (data.features || data.decisions) {
                html += `<div class="content-block"><h3>✅ 关键决策</h3><ul>`;
                const items = data.features || data.decisions || [];
                items.forEach(item => {
                    if (typeof item === 'string') html += `<li>${item}</li>`;
                    else if (item.name) html += `<li><strong>${item.name}</strong> - ${item.desc || ''}</li>`;
                });
                html += `</ul></div>`;
            }
            
            // Key moments
            if (data.keyMoments) {
                html += `<div class="content-block"><h3>🎯 核心记忆点</h3><ul>`;
                data.keyMoments.forEach(m => html += `<li>${m}</li>`);
                html += `</ul></div>`;
            }
            
            // Reference images - Clickable with download
            if (data.referenceImages) {
                html += `<div class="content-block"><h3>🖼️ 参考图（点击查看/下载）</h3><div class="reference-images">`;
                data.referenceImages.forEach(img => {
                    html += `
                        <div class="reference-image-item">
                            <a href="${img.src}" target="_blank" title="点击查看大图">
                                <img src="${img.src}" alt="${img.title}" onerror="this.style.display='none'">
                            </a>
                            <div class="image-info">
                                <div class="image-title">${img.title}</div>
                                <div class="image-desc">${img.desc}</div>
                                <a href="${img.src}" download class="download-link">⬇️ 下载图片</a>
                            </div>
                        </div>
                    `;
                });
                html += `</div></div>`;
            }
            
            // Three Views - 三视图展示
            if (data.threeViews) {
                html += `<div class="content-block"><h3>📐 三视图（角色一致性规范）</h3><div class="reference-images">`;
                const views = [
                    { key: 'front', label: '正视图' },
                    { key: 'side', label: '侧视图' },
                    { key: 'back', label: '后视图' }
                ];
                views.forEach(view => {
                    const viewData = data.threeViews[view.key];
                    if (viewData) {
                        const imageUrl = viewData.image.startsWith('http') ? viewData.image : `https://hiyascott.github.io/hiyamax-blog/assets/the_147th_day/${viewData.image}`;
                        html += `
                            <div class="reference-image-item">
                                <a href="${imageUrl}" target="_blank" title="点击查看大图">
                                    <img src="${imageUrl}" alt="${view.label}" onerror="this.style.display='none'">
                                </a>
                                <div class="image-info">
                                    <div class="image-title">${view.label}</div>
                                    <div class="image-desc">${viewData.desc || ''}</div>
                                    <a href="${imageUrl}" download class="download-link">⬇️ 下载${view.label}</a>
                                </div>
                            </div>
                        `;
                    }
                });
                html += `</div></div>`;
            }
            
            // Best Practice - 最佳实践
            if (data.bestPractice) {
                html += `<div class="content-block"><h3>⭐ ${data.bestPractice.title}</h3><ul>`;
                data.bestPractice.points.forEach(point => {
                    html += `<li>${point}</li>`;
                });
                html += `</ul></div>`;
            }
            
            // Scenes - 场景设计展示 (卡片式大图)
            if (data.scenes) {
                html += `<div class="content-block"><h3>🎨 场景设计</h3><div class="scene-cards">`;
                data.scenes.forEach(scene => {
                    const imageUrl = scene.src ? `https://hiyascott.github.io${scene.src}` : scene.image;
                    if (imageUrl) {
                        html += `
                            <div class="scene-card">
                                <a href="${imageUrl}" target="_blank" title="点击查看大图">
                                    <img src="${imageUrl}" alt="${scene.title}" onerror="this.style.display='none'">
                                </a>
                                <div class="image-info">
                                    <div class="image-title">${scene.title}</div>
                                    <div class="image-desc">${scene.desc || ''}</div>
                                    <div class="image-meta">${scene.shot || ''} · 氛围: ${scene.mood || ''} · 光线: ${scene.lighting || ''}</div>
                                    <a href="${imageUrl}" download class="download-link">⬇️ 下载图片</a>
                                </div>
                            </div>
                        `;
                    }
                });
                html += `</div></div>`;
            }

            // Shots / Keyframes - 分镜首帧展示 (卡片式大图)
            if (data.shots) {
                html += `<div class="content-block"><h3>🎬 分镜首帧</h3><div class="scene-cards">`;
                data.shots.forEach(shot => {
                    const firstFrame = shot.firstFrame || {};
                    const imageUrl = firstFrame.src ? `https://hiyascott.github.io${firstFrame.src}` : (firstFrame.image || firstFrame.url);
                    if (imageUrl) {
                        html += `
                            <div class="scene-card">
                                <a href="${imageUrl}" target="_blank" title="点击查看大图">
                                    <img src="${imageUrl}" alt="${shot.title}" onerror="this.style.display='none'">
                                </a>
                                <div class="image-info">
                                    <div class="image-title">镜头${shot.number} - ${shot.title}</div>
                                    <div class="image-desc">${shot.desc || ''}</div>
                                    <div class="image-meta">${shot.time || ''} · 状态: ${shot.status || ''}</div>
                                    <a href="${imageUrl}" download class="download-link">⬇️ 下载首帧</a>
                                </div>
                            </div>
                        `;
                    }
                });
                html += `</div></div>`;
            }
            
            // Video clips - With player and download
            if (data.clips) {
                html += `<div class="content-block"><h3>🎬 视频片段（点击播放/下载）</h3>`;
                data.clips.forEach(clip => {
                    const videoPath = clip.src || `./assets/the_147th_day/${clip.filename}`;
                    html += `
                        <div class="video-container">
                            <video controls preload="metadata">
                                <source src="${videoPath}" type="video/mp4">
                                您的浏览器不支持视频播放
                            </video>
                            <div class="video-info">
                                <h4>${clip.title} (${clip.time})</h4>
                                <p>${clip.desc}</p>
                                <div class="video-meta">
                                    <span>📁 ${clip.filename || clip.id}</span>
                                    ${clip.size ? `<span>💾 ${clip.size}</span>` : ''}
                                </div>
                                <div class="video-actions">
                                    <a href="${videoPath}" target="_blank">▶️ 新窗口播放</a>
                                    <a href="${videoPath}" download="${clip.filename || 'video.mp4'}">⬇️ 下载视频</a>
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
            }
            
            // Prompt display
            if (data.prompt) {
                html += `<div class="content-block"><h3>🎨 Prompt</h3><pre style="background: var(--bg-tertiary); padding: 15px; border-radius: 8px; font-size: 12px; overflow-x: auto; color: var(--text-secondary);">${data.prompt}</pre></div>`;
            }
            
            // Issues
            if (data.issues) {
                html += `<div class="content-block"><h3>⚠️ 遇到的问题</h3><ul>`;
                data.issues.forEach(issue => html += `<li>${issue}</li>`);
                html += `</ul></div>`;
            }
            
            // Cost
            if (data.cost || data.output) {
                html += `<div class="content-block"><h3>💰 成本与输出</h3>`;
                if (data.cost) html += `<p><strong>成本：</strong>${data.cost}</p>`;
                if (data.output) {
                    const outputStr = typeof data.output === 'object' ? 
                        Object.entries(data.output).map(([k,v]) => `${k}: ${v}`).join(', ') : 
                        data.output;
                    html += `<p><strong>输出：</strong>${outputStr}</p>`;
                }
                html += `</div>`;
            }
            
            return html;
        }
        
        function renderDiscussions(discussions) {
            let html = `<div class="content-block"><h3>💬 讨论记录</h3><div class="discussion-list">`;
            
            discussions.forEach(d => {
                html += `
                    <div class="discussion-card">
                        <div class="discussion-header">
                            <span class="discussion-date">${d.date}</span>
                            <span class="discussion-platform">${d.platform}</span>
                        </div>
                        <div class="discussion-summary">${d.summary}</div>
                `;
                
                if (d.decisions && d.decisions.length > 0) {
                    html += `<div class="decision-tags">`;
                    d.decisions.forEach(dec => html += `<span class="decision-tag">${dec}</span>`);
                    html += `</div>`;
                }
                
                html += `</div>`;
            });
            
            html += `</div></div>`;
            return html;
        }
        
        function switchVersion(stepNum, versionIndex) {
            const stepSection = document.querySelector(`[data-step="${stepNum}"]`);
            if (!stepSection) return;
            
            const tabs = stepSection.querySelectorAll('.version-tab');
            tabs.forEach((tab, i) => tab.classList.toggle('active', i === versionIndex));
            
            if (window.currentProjectData) {
                const step = window.currentProjectData.steps.find(s => s.number === stepNum);
                if (step && step.content.versions[versionIndex]) {
                    const contentDiv = document.getElementById(`step-${stepNum}-content`);
                    if (contentDiv) {
                        contentDiv.innerHTML = renderVersionContent(step.content.versions[versionIndex], stepNum);
                    }
                }
            }
        }
        
        init();
    </script>
</body>
</html>
